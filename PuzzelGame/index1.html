<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آجر آلمانی - صفت‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap");

      body { 
        font-family: "Vazirmatn", system-ui, sans-serif; 
      }

      .game-container {
        background: #1f2937;
        padding: 16px;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
      }

      .success-row {
        background: #166526b8;
        border: 1px solid #4ade80;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-size: 1.1rem;
        font-weight: 700;
        color: white;
        cursor: pointer;
      }

      .bottom-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
        gap: 10px;
        margin-bottom: 15px;
      }

      .bottom-cell {
        background: #334155;
        border-radius: 12px;
        padding: 14px 8px;
        text-align: center;
        font-weight: 600;
        color: #e0f2fe;
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.93rem;
        user-select: none;
        touch-action: manipulation;
      }

      .bottom-cell:active {
        transform: scale(0.92);
        background: #3b82f6;
      }

      .falling-piece {
        position: absolute;
        background: linear-gradient(135deg, #7c3aed, #c026d3);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 1.65rem;
        border-radius: 18px;
        box-shadow: 0 20px 30px -8px rgb(0 0 0 / 0.6);
        z-index: 50;
        cursor: grab;
        user-select: none;
        padding: 14px 28px;
        white-space: nowrap;
      }

      @media (max-width: 640px) {
        .falling-piece {
          font-size: 1.45rem;
          padding: 12px 22px;
        }
        .bottom-cell {
          min-height: 68px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body class="bg-gray-950 text-white min-h-screen pb-8">
    <div class="max-w-7xl mx-auto p-4">
      <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <div class="flex items-center gap-6 text-sm">
          <div>
            <span class="text-emerald-400">L</span> 
            <span id="level" class="font-bold text-2xl">1</span>
          </div>
          
          <div>
            <span class="text-sky-400">T</span> 
            <span id="progress" class="font-bold text-2xl">0/20</span>
          </div>
          
          <div>
            <span class="text-amber-400">F</span> 
            <span id="mistakes" class="font-bold text-2xl text-red-600">0/0</span>
          </div>
        </div>

        <!-- دکمه شروع مجدد -->
        <button onclick="resetFullGame()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-2xl transition">
          <i class="fas fa-redo text-red-500" style="font-size: 20px;"></i>
          <span class="text-sm">شروع مجدد</span>
        </button>
      </div>

      <div class="flex gap-6 flex-col lg:flex-row">
        <div class="flex-1">
          <div id="falling-container" class="relative h-36 md:h-20 mb-6 flex justify-center"></div>
          <div id="game-container" class="game-container">
            <div id="bottom-container"></div>
            <div id="success-container" class="flex flex-col gap-3 mt-2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
      <div class="bg-gray-900 rounded-3xl max-w-lg w-full mx-4 p-8">
        <button onclick="closeModal()" class="float-right text-4xl text-gray-400 hover:text-white">×</button>
        <div class="text-center mb-8">
          <div id="modal-german" class="text-6xl font-bold"></div>
          <div id="modal-persian" class="text-2xl text-emerald-400 mt-3"></div>
        </div>
        <button onclick="closeModal()" class="mt-8 w-full py-4 bg-gray-700 hover:bg-gray-600 rounded-2xl">بازگشت</button>
      </div>
    </div>

    <script>
      let adjectives = [];
      let currentLevel = 1;
      let completedInLevel = 0;     // تعداد صفت‌های صحیح در مرحله فعلی
      let mistakes = 0;
      let currentAdjective = null;
      let currentBottomSet = [];
      let usedAdjectives = new Set();
      let adjectiveIndex = 0;

      const STORAGE_KEY = "germanAdjectivesProgress";
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      async function loadAdjectives() {
        try {
          const res = await fetch("adjective.json");
          adjectives = await res.json();
        } catch (e) {
          console.error("فایل adjective.json پیدا نشد");
        }
      }

      function saveProgress() {
        const progress = {
          currentLevel,
          completedInLevel,
          mistakes,
          usedAdjectives: Array.from(usedAdjectives),
          adjectiveIndex
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      }

      function loadProgress() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          currentLevel = data.currentLevel || 1;
          completedInLevel = data.completedInLevel || 0;
          mistakes = data.mistakes || 0;
          usedAdjectives = new Set(data.usedAdjectives || []);
          adjectiveIndex = data.adjectiveIndex || 0;
        }
      }

      function updateUI() {
        document.getElementById("level").textContent = currentLevel;
        document.getElementById("progress").textContent = `${completedInLevel}/20`;
        document.getElementById("mistakes").textContent = `${mistakes}/5`;
      }

      function getNextAdjective() {
        if (adjectives.length === 0) return null;
        let index = adjectiveIndex % adjectives.length;
        let adj = adjectives[index];

        let attempts = 0;
        while (usedAdjectives.has(adj.adjective) && attempts < adjectives.length) {
          index = (index + 1) % adjectives.length;
          adj = adjectives[index];
          attempts++;
        }

        adjectiveIndex = (index + 1) % adjectives.length;
        return adj;
      }

      function spawnNewFallingPiece() {
        currentAdjective = getNextAdjective();
        if (!currentAdjective) return;

        const container = document.getElementById("falling-container");
        container.innerHTML = `
          <div id="falling-piece" class="falling-piece">
            ${currentAdjective.adjective}
          </div>
        `;
      }

      function renderNewBottomRow() {
        if (!currentAdjective) return;

        const bottomContainer = document.getElementById("bottom-container");
        bottomContainer.innerHTML = "";

        const bottomDiv = document.createElement("div");
        bottomDiv.className = "bottom-row";

        let others = adjectives
          .filter(item => item.adjective !== currentAdjective.adjective)
          .sort(() => Math.random() - 0.5)
          .slice(0, 7);

        currentBottomSet = [currentAdjective, ...others].sort(() => Math.random() - 0.5);

        currentBottomSet.forEach((item) => {
          const cell = document.createElement("div");
          cell.className = "bottom-cell";
          cell.textContent = item.translation_fa;
          cell.dataset.german = item.adjective;

          cell.addEventListener("click", () => {
            if (currentAdjective && item.adjective === currentAdjective.adjective) {
              successDrop(item.adjective, item.translation_fa);
            } else {
              wrongDrop();
            }
          });

          bottomDiv.appendChild(cell);
        });

        bottomContainer.appendChild(bottomDiv);
      }

      function successDrop(german, persian) {
        usedAdjectives.add(german);

        const successContainer = document.getElementById("success-container");
        const successRow = document.createElement("div");
        successRow.className = "success-row";
        successRow.innerHTML = `<span>${german}</span><span style="color:#a5f3fc; font-size:1.4rem;">→</span><span>${persian}</span>`;
        successRow.onclick = () => showDetails(german);
        successContainer.appendChild(successRow);

        completedInLevel++;
        updateUI();
        saveProgress();

        if (completedInLevel >= 20) {
          setTimeout(() => {
            alert(`🎉 مرحله ${currentLevel} با موفقیت تمام شد!`);
            currentLevel++;
            completedInLevel = 0;
            startNewRound();
          }, 700);
        } else {
          setTimeout(() => {
            document.getElementById("bottom-container").innerHTML = "";
            spawnNewFallingPiece();
            renderNewBottomRow();
          }, 500);
        }
      }

      function wrongDrop() {
        mistakes++;
        updateUI();
        saveProgress();

        const piece = document.getElementById("falling-piece");
        if (piece) {
          piece.style.transition = "all 0.3s";
          piece.style.transform = "translateX(30px)";
          setTimeout(() => piece.style.transform = "translateX(-30px)", 100);
          setTimeout(() => piece.style.transform = "translateX(0)", 400);
        }

        if (mistakes >= 5) {
          alert("۵ خطا! بازی از اول شروع شد.");
          resetFullGame();
        } else {
          setTimeout(() => {
            document.getElementById("bottom-container").innerHTML = "";
            spawnNewFallingPiece();
            renderNewBottomRow();
          }, 400);
        }
      }

      function startNewRound() {
        document.getElementById("success-container").innerHTML = "";
        document.getElementById("bottom-container").innerHTML = "";
        spawnNewFallingPiece();
        renderNewBottomRow();
        updateUI();
        saveProgress();
      }

      function resetFullGame() {
        if (confirm("آیا مطمئن هستید که می‌خواهید تمام پیشرفت خود را پاک کنید؟")) {
          localStorage.removeItem(STORAGE_KEY);
          currentLevel = 1;
          completedInLevel = 0;
          mistakes = 0;
          usedAdjectives.clear();
          adjectiveIndex = 0;
          startNewRound();
        }
      }

      function showDetails(german) {
        const adj = adjectives.find(a => a.adjective === german);
        if (!adj) return;
        document.getElementById("modal-german").textContent = adj.adjective;
        document.getElementById("modal-persian").textContent = adj.translation_fa;
        document.getElementById("detail-modal").classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("detail-modal").classList.add("hidden");
      }

      window.onload = async () => {
        await loadAdjectives();
        if (adjectives.length === 0) {
          alert("فایل adjective.json را در پوشه قرار دهید!");
          return;
        }
        loadProgress();
        updateUI();
        startNewRound();
      };
    </script>
  </body>
</html>

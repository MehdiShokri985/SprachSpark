<!doctype html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">German Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fall {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .falling-word { animation: fall 2s ease-out; }
    .modal-overlay { backdrop-filter: blur(4px); }
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #64748b;
      border-radius: 20px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white shadow">
    <div class="container mx-auto px-4 py-4">
      <div class="flex justify-between items-center">
        
        <!-- عنوان قابل کلیک -->
        <a href="index.html" 
           id="headerTitle"
           class="text-xl md:text-2xl font-bold text-indigo-800 hover:text-indigo-600 transition-colors flex items-center gap-2">
          German Learning
        </a>
        
        <div class="flex gap-3 md:gap-4 text-xs md:text-sm">
          <div class="bg-green-100 px-3 py-1 rounded-full">
            <span class="text-green-800 font-semibold"> <span id="correctCount">0</span></span>
          </div>
          <div id="wrongCounter" class="bg-red-100 px-3 py-1 rounded-full cursor-pointer hover:bg-red-200 active:bg-red-300 transition-colors">
            <span class="text-red-800 font-semibold"> <span id="wrongCount">0</span></span>
          </div>
          <div class="bg-blue-100 px-3 py-1 rounded-full">
            <span class="text-blue-800 font-semibold"> <span id="score">0</span></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Progress Bar -->
  <div class="container mx-auto px-4 py-4">
    <div class="bg-white rounded-lg shadow p-4">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-medium text-gray-700">Mastery-Fortschritt</span>
        <span class="text-sm text-gray-600"><span id="masteryProgress">0</span>% Abschließen</span>
      </div>
      <div class="w-full bg-blue-100 rounded-full h-2">
        <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-purple-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
      </div>
      
   
      <div class="mt-3 text-xs text-gray-600">
  <!-- Row 1: Niveau + Modus -->
  <div class="flex flex-wrap items-center gap-x-5 gap-y-3 mb-3">
    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700 whitespace-nowrap">Niveau:</span>
      <select id="levelSelect" 
              class="bg-white border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:border-indigo-500">
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="B1">B1</option>
        <option value="B2">B2</option>
        <option value="C1">C1</option>
        <option value="C2">C2</option>
      </select>
    </div>

    <div class="flex items-center gap-2">
      <span class="font-medium text-gray-700 whitespace-nowrap">Modus:</span>
      <select id="modeSelect" 
              class="bg-white border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:border-indigo-500">
        <option value="normal">Normal</option>
        <option value="hard">Hard</option>
      </select>
    </div>
  </div>

  <!-- Row 2: Statistics -->
<div id="levelStats" 
       class="font-medium text-indigo-700 text-[13px] bg-indigo-50 px-4 py-1 rounded-xl border border-indigo-100 text-center">
    <!-- JavaScript این قسمت را پر می‌کند -->
  </div>
</div>


    </div>
  </div>

  <!-- Game Area -->
  <main class="container mx-auto px-4 py-1">
    <div class="max-w-4xl mx-auto">
         <!-- Word Progress Squares -->
      <div id="wordProgressSquares" class="flex flex-wrap gap-1 mb-3 justify-center"></div>
      <div class="bg-white rounded-2xl shadow p-6 mb-3 min-h-[120px] flex items-center justify-center">
        <div id="wordDisplay" class="text-center w-full">
          <div id="fallingWord" class="falling-word text-2xl font-bold text-indigo-800 mb-4">
            Klicke auf „Spiel starten“, um zu beginnen.
          </div>
          <div id="sentenceDisplay" dir="rtl" class="text-lg text-gray-600 mt-4 hidden"></div>
          <div id="questionType" class="text-sm text-gray-500 mt-2"></div>
        </div>
      </div>

      <!-- Normal Mode Answers -->
      <div id="answerOptions" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-3"></div>

      <!-- Hard Mode Input -->
      <div id="hardInputContainer" class="hidden mb-6">
        <div class="max-w-md mx-auto">
          <div class="flex gap-2 mb-3">
            <button onclick="game.setAutoCompleteMode(1)" id="ac1" 
                    class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all">Nach 1. Buchstabe</button>
            <button onclick="game.setAutoCompleteMode(2)" id="ac2" 
                    class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all">Nach 2. Buchstabe</button>
            <button onclick="game.setAutoCompleteMode(0)" id="ac0" 
                    class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all">Nur vollständig</button>
          </div>
          
          <div class="flex gap-3">
            <input id="hardInput" type="text" 
                   class="flex-1 border-2 border-indigo-300 focus:border-indigo-600 rounded-xl px-5 py-3 text-xl focus:outline-none"
                   placeholder="Deutsches Wort eingeben..."
                   autocomplete="off">
            <button id="submitBtn" onclick="game.submitHardAnswer()" 
                    class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-xl font-medium transition-all">
              Prüfen
            </button>
          </div>
          
          <div id="autocompleteList" class="mt-2 bg-white rounded-xl shadow border border-gray-200 max-h-60 overflow-auto hidden"></div>
        </div>
      </div>

      <!-- Control Buttons -->
      <div class="flex justify-center gap-4">
        <button id="startBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition-all transform hover:scale-105 shadow ">
          Spiel starten
        </button>
        <button id="nextBtn" class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-600 hover:to-blue-700 transition-all transform hover:scale-105 shadow  hidden">
          Nächste Frage
        </button>
        <button id="resetBtn" class="bg-gradient-to-r from-gray-500 to-gray-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-gray-600 hover:to-gray-700 transition-all transform hover:scale-105 shadow ">
          Fortschritt zurücksetzen
        </button>
      </div>
    </div>
  </main>


  <!-- Modals -->
  <div id="modeModal" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full mx-4">
      <h2 class="text-2xl font-bold text-center mb-6 text-indigo-800">Wähle Spielmodus</h2>
      <div class="space-y-4">
        <button onclick="game.selectMode('normal')" class="w-full p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-left transition-all group">
          <div class="font-semibold text-lg group-hover:text-indigo-600">Normal Mode</div>
          <div class="text-gray-600 text-sm">4 Auswahlmöglichkeiten (Multiple Choice)</div>
        </button>
        <button onclick="game.selectMode('hard')" class="w-full p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-left transition-all group">
          <div class="font-semibold text-lg group-hover:text-indigo-600">Hard Mode (Typing)</div>
          <div class="text-gray-600 text-sm">Wort selbst eintippen + Autocomplete</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Result Modal -->
  <div id="resultModal" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl p-4 max-w-md mx-4 transform transition-all">
      <div class="text-center">
        <div id="modalIcon" class="text-6xl mb-4"></div>
        <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
        <p id="modalMessage" class="text-gray-600 mb-2"></p>
        <div id="modalDetails" class="bg-gray-50 rounded-lg p-2 mb-2 text-left text-sm"></div>
        <button id="modalCloseBtn" class="mt-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-indigo-600 hover:to-purple-700 transition-all">
          Weiter
        </button>
      </div>
    </div>
  </div>

  <!-- Mistakes Modal -->
  <div id="mistakesModal" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50">
    <div class="bg-slate-50 rounded-2xl shadow-2xl p-6 max-w-sm mx-4 w-full max-h-[85vh] overflow-hidden flex flex-col border border-slate-200">
      <h2 class="text-lg font-bold mb-4 text-amber-600 flex items-center gap-2">Meine Fehler</h2>
      <div id="mistakesList" class="space-y-3 max-h-[60vh] overflow-auto pr-2 text-[14.5px] custom-scroll"></div>
      <div class="mt-auto pt-4 border-t border-slate-200">
        <button id="closeMistakesBtn" class="w-full bg-slate-700 hover:bg-slate-800 text-white py-3 rounded-2xl font-medium text-sm transition-all">
          Schließen
        </button>
      </div>
    </div>
  </div>


  <div id="confidenceModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm modal-overlay hidden items-center justify-center z-50 animate-fadeIn">
  <div class="relative bg-white/85 backdrop-blur-xl rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.35)] p-10 max-w-md mx-4 border border-white/30 overflow-hidden">

    <!-- Glow Effects -->
    <div class="absolute -top-10 -left-10 w-32 h-32 bg-emerald-300 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-violet-300 rounded-full blur-3xl opacity-20"></div>

    <div class="relative text-center">
      
      <div class="text-5xl mb-5 drop-shadow-lg animate-bounce">
        😎
      </div>

      <h2 class="text-3xl font-extrabold mb-8 text-gray-800 tracking-tight">
        Bist du sicher?
      </h2>

      <div class="flex gap-5 justify-center">
        
        <button id="sureBtn"
          class="bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 hover:scale-105 hover:shadow-[0_10px_35px_rgba(16,185,129,0.45)] text-white px-10 py-3 rounded-2xl font-bold transition-all duration-300">
          Ja, sicher
        </button>

        <button id="maybeBtn"
          class="bg-gradient-to-r from-violet-500 via-fuchsia-500 to-pink-500 hover:scale-105 hover:shadow-[0_10px_35px_rgba(168,85,247,0.45)] text-white px-10 py-3 rounded-2xl font-bold transition-all duration-300">
          Nicht sicher
        </button>

      </div>
    </div>
  </div>
</div>

  <script type="module" src="js/main.js"></script>
</body>
</html>

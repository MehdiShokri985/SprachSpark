<!doctype html>
<html lang="de" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">German Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="css/word-progress-squares.css" />
    <link rel="stylesheet" href="css/game-responsive.css" />
       
    <style>
      @keyframes fall {
        from {
          transform: translateY(-100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-overlay {
        backdrop-filter: blur(4px);
      }
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background-color: #64748b;
        border-radius: 20px;
      }

    </style>
  </head>
  <body
    class="game-page bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans overflow-x-hidden"
  >
    <!-- Header -->
    <header class="bg-white shadow">
      <div class="container mx-auto px-4 py-2">
        <div class="game-header-inner flex justify-between items-center flex-wrap">
          <!-- عنوان قابل کلیک -->
          <a
            href="index.html"
            id="headerTitle"
            class="game-header-title font-bold text-indigo-800 hover:text-indigo-600 transition-colors flex items-center gap-2"
          >
            German Learning
          </a>

          <div class="game-header-stats flex gap-2 sm:gap-3 md:gap-4 text-xs md:text-sm">
            <div class="bg-green-100 px-3 py-1 rounded-full">
              <span class="text-green-800 font-semibold">
                <span id="correctCount">0</span></span
              >
            </div>
            <div
              id="wrongCounter"
              class="bg-red-100 px-3 py-1 rounded-full cursor-pointer hover:bg-red-200 active:bg-red-300 transition-colors"
            >
              <span class="text-red-800 font-semibold">
                <span id="wrongCount">0</span></span
              >
            </div>
            <div class="bg-blue-100 px-3 py-1 rounded-full">
              <span class="text-blue-800 font-semibold">
                <span id="score">0</span></span
              >
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="container mx-auto px-4 py-2">
      <div class="game-progress-card bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-medium text-gray-700"
            >Mastery-Fortschritt</span
          >
          <span class="text-sm text-gray-600"
            ><span id="masteryProgress">0</span>% Abschließen</span
          >
        </div>
        <div class="w-full bg-blue-100 rounded-full h-2">
          <div
            id="progressBar"
            class="bg-gradient-to-r from-indigo-500 to-purple-600 h-2 rounded-full transition-all duration-300"
            style="width: 0%"
          ></div>
        </div>

        <div class="mt-3 text-xs text-gray-600">
          <!-- Row 1: Niveau + Modus -->
          <div class="flex flex-wrap items-center gap-x-5 gap-y-3 mb-3">
            <div class="flex items-center gap-2">
              <span class="font-medium text-gray-700 whitespace-nowrap"
                >Niveau:</span
              >
              <select
                id="levelSelect"
                class="bg-white border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:border-indigo-500"
              >
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
                <option value="C1">C1</option>
                <option value="C2">C2</option>
              </select>
            </div>

            <div class="flex items-center gap-2">
              <span class="font-medium text-gray-700 whitespace-nowrap"
                >Modus:</span
              >
              <select
                id="modeSelect"
                class="bg-white border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:border-indigo-500"
              >
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
              </select>
            </div>
          </div>

          <!-- Row 2: Statistics -->
          <div
            id="levelStats"
            class="game-level-stats font-medium text-indigo-700 text-[13px] bg-indigo-50 px-3 sm:px-4 py-1 rounded-xl border border-indigo-100 text-center"
          >
            <!-- JavaScript این قسمت را پر می‌کند -->
          </div>
        </div>
      </div>
    </div>

    <!-- Game Area -->
    <main class="container mx-auto px-3 sm:px-4 pb-4">
      <div class="max-w-4xl mx-auto min-w-0 w-full">
        <!-- Word Progress Squares -->
         <div id="wordProgressSquares" class="mb-3"></div>
        <div id="panel"
          class="game-panel bg-white rounded-2xl shadow p-4 sm:p-6 mb-3 flex items-center justify-center relative"
        >
          <button
            id="resetBtn"
            class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-2 rounded-lg transition-all text-sm font-medium"
            title="Fortschritt zurücksetzen"
          >
            ↺
          </button>
          <div id="wordDisplay" class="text-center w-full min-w-0 px-1">
            <div
              id="fallingWord"
              class="falling-word font-bold text-indigo-800"
            >
             Klicke hier, um zu beginnen.
            </div>
            <div
              id="sentenceDisplay"
              dir="rtl"
              class="text-gray-600 mt-2 sm:mt-3 hidden"
            ></div>
            <div id="questionType" class="text-sm text-gray-500 mt-2"></div>
          </div>
        </div>

        <!-- Normal Mode Answers -->
        <div
          id="answerOptions"
          class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-3 md:gap-4 mb-3 w-full min-w-0"
        ></div>


              <!-- Result View (Inline) -->
      <div id="resultModal" class="hidden bg-white rounded-2xl shadow p-2 sm:p-3 mb-3 w-full min-w-0 max-w-full">
        <div class="text-center min-w-0">
          <div id="modalIcon" class="leading-none"></div>
          <h2 id="modalTitle" class="font-bold"></h2>
          <div id="modalDetails" class="bg-gray-50 rounded-lg px-2.5 py-1.5 mb-1.5 text-left text-sm leading-snug max-w-full overflow-hidden"></div>
          <div class="game-result-actions flex flex-wrap justify-center mt-1 w-full">
            <button id="sureBtn"
              class="game-result-btn bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 hover:scale-105 hover:shadow-[0_10px_35px_rgba(16,185,129,0.45)] text-white rounded-2xl font-bold transition-all duration-300">
              Ja, sicher
            </button>
            <button id="maybeBtn"
              class="game-result-btn bg-gradient-to-r from-violet-500 via-fuchsia-500 to-pink-500 hover:scale-105 hover:shadow-[0_10px_35px_rgba(168,85,247,0.45)] text-white rounded-2xl font-bold transition-all duration-300">
              Nicht sicher
            </button>
            <button id="easyBtn" type="button"
              class="game-result-btn hidden bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 hover:scale-105 hover:shadow-[0_10px_35px_rgba(245,158,11,0.45)] text-white rounded-2xl font-bold transition-all duration-300">
             Ganz einfach
            </button>
          </div>
        </div>
      </div>


        <!-- Hard Mode Input -->
        <div id="hardInputContainer" class="hidden mb-6">
          <div class="max-w-md mx-auto">
            <div class="flex gap-2 mb-3">
              <button
                onclick="game.setAutoCompleteMode(1)"
                id="ac1"
                class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all"
              >
                Nach 1. Buchstabe
              </button>
              <button
                onclick="game.setAutoCompleteMode(2)"
                id="ac2"
                class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all"
              >
                Nach 2. Buchstabe
              </button>
              <button
                onclick="game.setAutoCompleteMode(0)"
                id="ac0"
                class="flex-1 py-2 text-xs font-medium rounded-lg border-2 border-indigo-200 hover:border-indigo-400 transition-all"
              >
                Nur vollständig
              </button>
            </div>

            <div class="flex gap-3">
              <input
                id="hardInput"
                type="text"
                class="flex-1 min-w-0 border-2 border-indigo-300 focus:border-indigo-600 rounded-xl px-3 sm:px-5 py-2 sm:py-3 focus:outline-none"
                placeholder="Deutsches Wort eingeben..."
                autocomplete="off"
              />
              <button
                id="submitBtn"
                onclick="game.submitHardAnswer()"
                class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-xl font-medium transition-all"
              >
                Prüfen
              </button>
            </div>

            <div
              id="autocompleteList"
              class="mt-2 bg-white rounded-xl shadow border border-gray-200 max-h-60 overflow-auto hidden"
            ></div>
          </div>
        </div>

    
      </div>
    </main>

    <!-- Modals -->
    <div
      id="modeModal"
      class="game-overlay-modal fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden flex items-center justify-center z-50 p-3"
    >
      <div class="game-overlay-panel bg-white rounded-3xl shadow-2xl p-5 sm:p-8 max-w-md w-full mx-auto overflow-y-auto">
        <h2 class="text-2xl font-bold text-center mb-6 text-indigo-800">
          Wähle Spielmodus
        </h2>
        <div class="space-y-4">
          <button
            onclick="game.selectMode('normal')"
            class="w-full p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-left transition-all group"
          >
            <div class="font-semibold text-lg group-hover:text-indigo-600">
              Normal Mode
            </div>
            <div class="text-gray-600 text-sm">
              4 Auswahlmöglichkeiten (Multiple Choice)
            </div>
          </button>
          <button
            onclick="game.selectMode('hard')"
            class="w-full p-6 border-2 border-gray-200 hover:border-indigo-500 rounded-2xl text-left transition-all group"
          >
            <div class="font-semibold text-lg group-hover:text-indigo-600">
              Hard Mode (Typing)
            </div>
            <div class="text-gray-600 text-sm">
              Wort selbst eintippen + Autocomplete
            </div>
          </button>
        </div>
      </div>
    </div>



    <!-- Mistakes Modal -->
    <div
      id="mistakesModal"
      class="game-overlay-modal fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50 p-3"
    >
      <div
        class="game-overlay-panel bg-slate-50 rounded-2xl shadow-2xl p-4 sm:p-6 max-w-sm mx-auto w-full overflow-hidden flex flex-col border border-slate-200"
      >
        <h2
          class="text-lg font-bold mb-4 text-amber-600 flex items-center gap-2"
        >
          Meine Fehler
        </h2>
        <div
          id="mistakesList"
          class="space-y-3 max-h-[60vh] overflow-auto pr-2 text-[14.5px] custom-scroll"
        ></div>
        <div class="mt-auto pt-4 border-t border-slate-200">
          <button
            id="closeMistakesBtn"
            class="w-full bg-slate-700 hover:bg-slate-800 text-white py-3 rounded-2xl font-medium text-sm transition-all"
          >
            Schließen
          </button>
       
        </div>
      </div>
    </div>

      <!-- Word Details Popup (Isolated) -->
  <div id="wordDetailsPopup" class="game-overlay-modal fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-3">
    <div class="game-overlay-panel bg-white rounded-2xl shadow-2xl p-4 sm:p-6 max-w-md mx-auto w-full overflow-hidden flex flex-col border border-white/30">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-indigo-800">Word Details</h2>
        <button id="closeWordDetailsBtn" class="text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none">&times;</button>
      </div>
      <div id="wordDetailsContent" class="flex-1 overflow-auto pr-2 text-sm custom-scroll"></div>
    </div>
  </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wörter — Vocabulary Details</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f8f9fb;
      color: #1a1a2e;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .nav-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: #4a6cf7;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .back-link svg {
      width: 20px;
      height: 20px;
    }

    .nav-bar h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .nav-bar h1 span {
      color: #4a6cf7;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .image-frame {
      background: #eef0f3;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    }

    .image-frame img {
      max-width: 100%;
      max-height: 75vh;
      width: auto;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.05);
    }

    .vocab-column {
      overflow-y: auto;
      min-height: 0;
    }

    .vocab-column::-webkit-scrollbar {
      width: 5px;
    }

    .vocab-column::-webkit-scrollbar-track {
      background: transparent;
    }

    .vocab-column::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    .vocab-table {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #eef0f3;
      overflow: hidden;
    }

    .vocab-row {
      display: grid;
      grid-template-columns: 60px 1fr 1fr;
      padding: 0.25rem 0.625rem;
      align-items: center;
      gap: 0.4rem;
    }

    .vocab-row + .vocab-row {
      border-top: 1px solid #f3f4f6;
    }

    .vocab-header {
      background: #f9fafb;
      padding: 0.25rem 0.625rem;
    }

    .vocab-header .vocab-cell {
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #b0b7c3;
    }

    .vocab-cell {
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .vocab-cell.german {
      font-weight: 600;
      color: #1a1a2e;
      overflow: visible;
      text-overflow: clip;
    }

    .vocab-cell.persian {
      direction: rtl;
      text-align: right;
      font-family: 'Vazirmatn', 'Tahoma', sans-serif;
    }

    .vocab-cell.pronunciation {
      color: #6b7280;
      font-style: italic;
    }

    .vocab-cell a {
      color: #4a6cf7;
      text-decoration: none;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.15s ease;
      white-space: nowrap;
    }

    .vocab-cell a:hover {
      border-bottom-color: #4a6cf7;
    }

    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }

    .loader span {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #9ca3af;
      font-size: 1.1rem;
    }

    .error-state strong {
      color: #6b7280;
    }

    .error-state .back-link {
      margin-top: 1.5rem;
      display: inline-flex;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem 0.875rem;
      }

      .nav-bar {
        margin-bottom: 1rem;
      }

      .nav-bar h1 {
        font-size: 1rem;
      }

      .detail-layout {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .image-frame {
        border-radius: 12px;
        padding: 0.5rem;
      }

      .image-frame img {
        /* max-height: 40vh; */
        border-radius: 6px;
      }

      .vocab-column {
        overflow-y: visible;
      }

      .vocab-row {
        grid-template-columns: repeat(3, 1fr);
        padding: 0.25rem 0.4rem;
        gap: 0.25rem;
      }

      .vocab-header {
        display: none;
      }

      .vocab-cell {
        font-size: 0.72rem;
      }

      .vocab-cell.persian {
        font-size: 0.76rem;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .detail-layout {
        gap: 1rem;
      }

      .image-frame {
        padding: 0.5rem;
      }

      .image-frame img {
        max-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a class="back-link" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back
      </a>
      <h1>Wör<span>ter</span></h1>
    </div>

    <div id="content"></div>
  </div>

  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    async function init() {
      const content = document.getElementById('content');
      const id = getQueryParam('id');

      if (!id) {
        content.innerHTML = '<div class="error-state"><strong>No vocabulary set selected.</strong><br><a class="back-link" href="index.html">Return to gallery</a></div>';
        return;
      }

      content.innerHTML = '<div class="loader"><span></span></div>';

      try {
        const res = await fetch('worter.json');
        if (!res.ok) throw new Error('Failed to load vocabulary data.');
        const data = await res.json();

        const item = data.find(entry => String(entry.id) === id);
        if (!item) {
          content.innerHTML = `<div class="error-state"><strong>Vocabulary set "${escapeHtml(id)}" not found.</strong><br><a class="back-link" href="index.html">Return to gallery</a></div>`;
          return;
        }

        renderDetail(content, item);
      } catch (err) {
        content.innerHTML = `<div class="error-state"><strong>Error loading vocabulary.</strong><br>${escapeHtml(err.message)}<br><a class="back-link" href="index.html">Return to gallery</a></div>`;
      }
    }

    function renderDetail(container, item) {
      const id = item.id;
      const words = Array.isArray(item.words) ? item.words : [];

      const rows = words.map(w => `
        <div class="vocab-row">
          <div class="vocab-cell german">
            <a
              href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(w.german)}"
              target="_blank"
              rel="noopener noreferrer"
              title="Translate on Google Translate"
            >${escapeHtml(w.german)}</a>
          </div>
          <div class="vocab-cell persian">${escapeHtml(w.persian)}</div>
          <div class="vocab-cell pronunciation">${escapeHtml(w.pronunciation)}</div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="detail-layout">
          <div class="vocab-column">
            <div class="vocab-table">
              <div class="vocab-row vocab-header">
                <div class="vocab-cell">DE</div>
                <div class="vocab-cell">FA</div>
                <div class="vocab-cell">Pronunciation</div>
              </div>
              ${rows}
            </div>
          </div>
          <div class="image-column">
            <div class="image-frame">
              <img src="images/${id}.jpg" alt="Vocabulary set ${id}">
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>

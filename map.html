let cityPoints = Array.from({length: cities.length}, () => []);

// تابع رنگ و آیکون (بدون تغییر)
function getTextColor(soundDe) {
  if (!soundDe) return '#000000';
  const trimmed = soundDe.trim().toLowerCase();
  if (trimmed.startsWith('der ')) return '#1a3cff';
  if (trimmed.startsWith('die ')) return '#e91e63';
  if (trimmed.startsWith('das ')) return '#0a8a2a';
  return '#000000';
}

function getCustomIcon(soundDe) {
  let emoji = '⚫';
  if (soundDe) {
    const trimmed = soundDe.trim().toLowerCase();
    if (trimmed.startsWith('der ')) emoji = '🔵';
    else if (trimmed.startsWith('die ')) emoji = '🟥';
    else if (trimmed.startsWith('das ')) emoji = '🟩';
  }
  return L.divIcon({
    className: '',
    html: `<span style="font-size:19px; line-height:1;">${emoji}</span>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
}

// بارگذاری داده‌ها
fetch('json/json-A2.json')
  .then(res => {
    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
    return res.json();
  })
  .then(data => {
    const items = data.filter(item => item.type !== "جمله");

    items.forEach((item, i) => {
      const cityIndex = i % cities.length;
      const city = cities[cityIndex];

      const offsetLat  = Math.sin(i * 1.234567) * 0.04 + Math.cos(i * 2.345678) * 0.03;
      const offsetLng = Math.sin(i * 0.987654) * 0.04 + Math.cos(i * 3.456789) * 0.03;

      let lat = city.lat + offsetLat;
      let lng = city.lng + offsetLng;

      cityPoints[cityIndex].push([lat, lng]);

      const audioSrc = item.file ? `audio-A2/${item.file}` : `audio-A2/${item.Filename}.mp3`;

      // جمله نمونه + لینک دیکشنری
      // let exampleSentence = "Ich sehe das Wort heute.";
      let dictLink = "#";
      let displayWord = "";

      if (item.Sound_de && item.Sound_de.trim()) {

        let searchTerm = word;
        if (lower.startsWith('der ') || lower.startsWith('die ') || lower.startsWith('das ')) {
          searchTerm = word.substring(4).trim();
        }

        displayWord = searchTerm || word;
      }

      }).addTo(map);

          <div class="city-name">${city.name}</div>
          <div class="number">شماره: ${item.Filename}</div>

               loading="lazy">

            ${item.Sound_de || ''}
          </div>
          <div class="fa">${item.translate_fa || ''}</div>
          
        
            مثال‌های بیشتر:
            <a href="${dictLink}" target="_blank" rel="noopener noreferrer">
               ${displayWord}
            </a>
          </div>
          
          <audio controls preload="metadata">
            <source src="${audioSrc}" type="audio/mpeg">
            مرورگر شما از پخش صدا پشتیبانی نمی‌کند.
          </audio>
        </div>
      `, {
        maxWidth: 420,
        minWidth: 300,
        className: 'custom-popup'
      });
    });

    // رسم خطوط اتصال (مسیر nearest neighbor)
    let fullPath = [];
    let previousEnd = null;

    cityPoints.forEach((group, idx) => {
      if (group.length === 0) return;

      let startPoint = previousEnd === null ? group[0] : group.reduce((best, p) => {
        const d = Math.hypot(p[0] - previousEnd[0], p[1] - previousEnd[1]);
        return d < best.d ? {p, d} : best;
      }, {p: group[0], d: Infinity}).p;

      let path = buildNNPath(group, startPoint);
      fullPath = fullPath.concat(path);
      previousEnd = path[path.length - 1];
    });

    L.polyline(fullPath, {
      color: '#182236',
      weight: 2,
      opacity: 0.7
    }).addTo(map);
  })
  .catch(err => {
    console.error("خطا در بارگذاری JSON:", err);
    alert("فایل json/json-A2.json پیدا نشد یا مشکل دارد.");
  });

// تابع nearest neighbor path
function buildNNPath(group, forcedStart) {
  if (group.length === 0) return [];
  let points = group.slice();
  let startIdx = points.findIndex(p =>
    Math.abs(p[0] - forcedStart[0]) < 1e-9 && Math.abs(p[1] - forcedStart[1]) < 1e-9
  );
  if (startIdx === -1) startIdx = 0;

  let path = [points.splice(startIdx, 1)[0]];

  while (points.length > 0) {
    let last = path[path.length - 1];
    let minDist = Infinity, closestIdx = 0;
    for (let i = 0; i < points.length; i++) {
      let dist = Math.hypot(points[i][0] - last[0], points[i][1] - last[1]);
      if (dist < minDist) {
        minDist = dist;
        closestIdx = i;
      }
    }
    path.push(points.splice(closestIdx, 1)[0]);
  }
  return path;
}

<!doctype html>
<html lang="de" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>German Adjectives Learning Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fall {
        from {
          transform: translateY(-100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .falling-word {
        animation: fall 2s ease-out;
      }
      .modal-overlay {
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans"
  >
    <!-- Header -->
    <header class="bg-white shadow-lg">
      <div class="container mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <h1 class="text-2xl font-bold text-indigo-800">
            German Adjectives Learning
          </h1>
          <div class="flex gap-4 text-sm">
            <div class="bg-green-100 px-2 py-0.5 rounded-full text-xs">
              <span class="text-green-800 font-semibold"
                >Correct: <span id="correctCount">0</span></span
              >
            </div>
            <div
              id="wrongCounter"
              class="bg-red-100 px-2 py-0.5 rounded-full text-xs cursor-pointer hover:bg-red-200 active:bg-red-300 transition-colors"
            >
              <span class="text-red-800 font-semibold"
                >Wrong: <span id="wrongCount">0</span></span
              >
            </div>
            <div class="bg-blue-100 px-2 py-0.5 rounded-full text-xs">
              <span class="text-blue-800 font-semibold"
                >Score: <span id="score">0</span></span
              >
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="container mx-auto px-4 py-4">
      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-medium text-gray-700"
            >Level Mastery Progress</span
          >
          <span class="text-sm text-gray-600"
            ><span id="masteryProgress">0</span>% Complete</span
          >
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div
            id="progressBar"
            class="bg-gradient-to-r from-indigo-500 to-purple-600 h-3 rounded-full transition-all duration-300"
            style="width: 0%"
          ></div>
        </div>
        <div class="flex justify-between mt-3 text-xs text-gray-600">
          <div class="flex items-center gap-2">
            <span>Level:</span>
            <select
              id="levelSelect"
              class="bg-white border border-gray-300 rounded px-2 py-1 text-xs font-semibold"
            >
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="B1">B1</option>
              <option value="B2">B2</option>
              <option value="C1">C1</option>
              <option value="C2">C2</option>
            </select>
          </div>
          <span id="levelStats" class="font-medium"></span>
        </div>
      </div>
    </div>

    <!-- Game Area -->
    <main class="container mx-auto px-4 py-8">
      <div class="max-w-4xl mx-auto">
        <div
          class="bg-white rounded-2xl shadow-xl p-8 mb-8 min-h-[200px] flex items-center justify-center"
        >
          <div id="wordDisplay" class="text-center">
            <div
              id="fallingWord"
              class="falling-word text-4xl font-bold text-indigo-800 mb-4"
            >
              Click "Start Game" to begin
            </div>
            <div
              id="sentenceDisplay"
              class="text-lg text-gray-600 mt-4 hidden"
            ></div>
            <div id="questionType" class="text-sm text-gray-500 mt-2"></div>
          </div>
        </div>

        <div
          id="answerOptions"
          class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"
        ></div>

        <div class="flex justify-center gap-4">
          <button
            id="startBtn"
            class="bg-gradient-to-r from-green-500 to-green-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition-all transform hover:scale-105 shadow-lg"
          >
            Start Game
          </button>
          <button
            id="nextBtn"
            class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-600 hover:to-blue-700 transition-all transform hover:scale-105 shadow-lg hidden"
          >
            Next Question
          </button>
          <button
            id="resetBtn"
            class="bg-gradient-to-r from-gray-500 to-gray-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-gray-600 hover:to-gray-700 transition-all transform hover:scale-105 shadow-lg"
          >
            Reset Progress
          </button>
        </div>
      </div>
    </main>

    <!-- Result Modal -->
    <div
      id="resultModal"
      class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl p-8 max-w-md mx-4 transform transition-all"
      >
        <div class="text-center">
          <div id="modalIcon" class="text-6xl mb-4"></div>
          <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
          <p id="modalMessage" class="text-gray-600 mb-6"></p>
          <div
            id="modalDetails"
            class="bg-gray-50 rounded-lg p-4 mb-6 text-left"
          ></div>

          <button
            id="modalCloseBtn"
            class="mt-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-3 rounded-lg font-semibold hover:from-indigo-600 hover:to-purple-700 transition-all"
          >
            Continue
          </button>
        </div>
      </div>
    </div>

    <!-- Mistakes List Modal -->
    <div
      id="mistakesModal"
      class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl p-6 max-w-lg mx-4 w-full max-h-[85vh] overflow-auto"
      >
        <h2 class="text-xl font-bold mb-4 text-red-600">
         Fehler
        </h2>
        <div
          id="mistakesList"
          class="space-y-4 max-h-[60vh] overflow-auto"
        ></div>

        <div class="flex gap-3 mt-6 sticky bottom-0 bg-white pt-4 border-t">
          <!-- <button
            id="practiceMistakesBtn"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold"
          >
            فقط این اشتباهات را تمرین کنم
          </button> -->
          <button
            id="closeMistakesBtn"
            class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-semibold"
          >
            بستن
          </button>
        </div>
      </div>
    </div>

    <!-- Confidence Modal -->
    <div
      id="confidenceModal"
      class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl p-8 max-w-md mx-4 transform transition-all"
      >
        <div class="text-center">
          <div class="text-6xl mb-4">🤔</div>
          <h2 class="text-2xl font-bold mb-6 text-gray-800">
            Are you sure about your answer?
          </h2>
          <div class="flex gap-4 justify-center">
            <button
              id="sureBtn"
              class="bg-green-500 hover:bg-green-600 text-white px-10 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg"
            >
              Sure
            </button>
            <button
              id="maybeBtn"
              class="bg-orange-500 hover:bg-orange-600 text-white px-10 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg"
            >
              Maybe
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      class AdaptiveLearningGame {
        constructor() {
          this.words = [];
          this.gameState = {
            score: 0,
            totalQuestions: 0,
            correctAnswers: 0,
            wrongAnswers: 0,
            currentLevel: "A1",
            lastWordId: null,
            progress: 0,
            sessionNumber: 1,
          };
          this.currentWord = null;
          this.currentQuestionType = null;
          this.currentSentence = null;
          this.isAnswering = false;
          this.lastFaToDeIndex = 0;
          this.pendingIsCorrect = false;
          this.pendingCorrectAnswer = null;
          this.currentLevelMistakes = [];

          this.init();
        }

        async init() {
          await this.loadData();
          this.setupEventListeners();
          this.updateUI();
        }

        async loadData() {
          try {
            const savedWords = localStorage.getItem("words");
            const savedState = localStorage.getItem("gameState");
            const savedMistakes = localStorage.getItem(
              `mistakes_${this.gameState.currentLevel || "A1"}`,
            );

            if (savedWords && savedState) {
              this.words = JSON.parse(savedWords);
              this.gameState = JSON.parse(savedState);
            } else {
              const wordsResponse = await fetch("p.json");
              this.words = await wordsResponse.json();

              this.words = this.words.map((word) => {
                const normalizedWord = { ...word };
                if (
                  normalizedWord.strength === undefined ||
                  normalizedWord.strength === null
                )
                  normalizedWord.strength = 0.3;
                normalizedWord.dueIn = normalizedWord.dueIn || 0;
                normalizedWord.seenCount = normalizedWord.seenCount || 0;
                normalizedWord.mistakeCount = normalizedWord.mistakeCount || 0;
                normalizedWord.correctStreak =
                  normalizedWord.correctStreak || 0;
                normalizedWord.sureCount = normalizedWord.sureCount || 0;

                normalizedWord.sentences = (normalizedWord.sentences || []).map(
                  (s) => ({
                    ...s,
                    strength: typeof s.strength === "number" ? s.strength : 0.3,
                    dueIn: s.dueIn ?? 0,
                    mistakeCount: s.mistakeCount ?? 0,
                    seenCount: s.seenCount ?? 0,
                    correctStreak: s.correctStreak ?? 0,
                    sureCount: s.sureCount ?? 0,
                  }),
                );
                return normalizedWord;
              });
            }

            this.currentLevelMistakes = savedMistakes
              ? JSON.parse(savedMistakes)
              : [];
            this.saveData();
          } catch (error) {
            console.error("Error loading data:", error);
            this.showError("Failed to load game data");
          }
        }

        saveData() {
          localStorage.setItem("gameState", JSON.stringify(this.gameState));
          localStorage.setItem("words", JSON.stringify(this.words));
          localStorage.setItem(
            `mistakes_${this.gameState.currentLevel}`,
            JSON.stringify(this.currentLevelMistakes),
          );
        }

        setupEventListeners() {
          document
            .getElementById("startBtn")
            .addEventListener("click", () => this.startGame());
          document
            .getElementById("nextBtn")
            .addEventListener("click", () => this.nextQuestion());
          document
            .getElementById("resetBtn")
            .addEventListener("click", () => this.resetProgress());
          document
            .getElementById("modalCloseBtn")
            .addEventListener("click", () => this.closeModal());
          document
            .getElementById("levelSelect")
            .addEventListener("change", (e) =>
              this.changeLevel(e.target.value),
            );
          document
            .getElementById("sureBtn")
            .addEventListener("click", () => this.handleConfidence("sure"));
          document
            .getElementById("maybeBtn")
            .addEventListener("click", () => this.handleConfidence("maybe"));

        //   document
        //     .getElementById("practiceMistakesBtn")
        //     .addEventListener("click", () => this.practiceMistakesOnly());
          document
            .getElementById("closeMistakesBtn")
            .addEventListener("click", () => this.closeMistakesModal());

          // کلیک روی Wrong Counter
          document
            .getElementById("wrongCounter")
            .addEventListener("click", () => this.showMistakesModal());

          document.addEventListener("keydown", (e) => {
            if (this.isAnswering) return;
            switch (e.key) {
              case "Enter":
                if (this.gameState.totalQuestions === 0) this.startGame();
                else this.nextQuestion();
                break;
              case "Escape":
                document.querySelectorAll(".modal-overlay").forEach((m) => {
                  if (!m.classList.contains("hidden"))
                    m.classList.add("hidden");
                });
                break;
              case "1":
              case "2":
              case "3":
              case "4":
                const buttons = document.querySelectorAll(
                  "#answerOptions button",
                );
                const index = parseInt(e.key) - 1;
                if (buttons[index]) buttons[index].click();
                break;
            }
          });
        }

        startGame() {
          this.gameState.totalQuestions = 0;
          // correctAnswers و wrongAnswers دیگر ریست نمی‌شوند تا شمارنده‌ها حفظ شوند
          this.gameState.sessionNumber++;

          document.getElementById("startBtn").classList.add("hidden");
          document.getElementById("nextBtn").classList.remove("hidden");
          this.nextQuestion();
        }

        selectNextWord() {
          const levelWords = this.words.filter(
            (word) => (word.level || "A1") === this.gameState.currentLevel,
          );
          const activeWords = levelWords.filter(
            (word) => (word.sureCount || 0) < 2,
          );
          if (activeWords.length === 0) return null;

          const dueWords = activeWords.filter((word) => word.dueIn <= 0);
          const candidateWords = dueWords.length > 0 ? dueWords : activeWords;

          let availableWords = candidateWords.filter(
            (word) => word.id !== this.gameState.lastWordId,
          );
          if (availableWords.length === 0) availableWords = candidateWords;

          const newWords = availableWords.filter(
            (word) => word.seenCount === 0,
          );
          const reviewWords = availableWords.filter(
            (word) => word.seenCount > 0,
          );

          const questionPosition = this.gameState.totalQuestions % 4;
          let selectedPool =
            questionPosition === 0 && newWords.length > 0
              ? newWords
              : reviewWords.length > 0
                ? reviewWords
                : newWords;

          selectedPool.sort((a, b) => {
            if (a.strength !== b.strength) return a.strength - b.strength;
            if (a.mistakeCount !== b.mistakeCount)
              return b.mistakeCount - a.mistakeCount;
            return a.seenCount - b.seenCount;
          });

          let selected = selectedPool[0];
          if (
            selected &&
            selected.id === this.gameState.lastWordId &&
            selectedPool.length > 1
          ) {
            selected =
              selectedPool.find((w) => w.id !== this.gameState.lastWordId) ||
              selected;
          }
          return selected;
        }

        determineQuestionType(word) {
          const s = word.strength;
          this.questionCounter = (this.questionCounter || 0) + 1;

          if (this.lastFaToDeIndex > 4) {
            this.lastFaToDeIndex = 0;
            return !word.sentences || word.sentences.length === 0
              ? { type: "de_to_fa", showWord: true }
              : { type: "fa_to_de", showWord: true };
          }

          let mode;
          const rand = Math.random();
          if (s < 0.4) mode = rand < 0.6 ? "de_to_fa" : "word_with_sentence";
          else if (s < 0.7) {
            if (rand < 0.4) mode = "de_to_fa";
            else if (rand < 0.8) mode = "word_with_sentence";
            else mode = "fa_to_de";
          } else {
            if (rand < 0.4) mode = "fa_to_de";
            else if (rand < 0.8) mode = "sentence_only";
            else mode = "word_with_sentence";
          }

          if (
            (mode === "word_with_sentence" || mode === "sentence_only") &&
            (!word.sentences || word.sentences.length === 0)
          ) {
            mode = "de_to_fa";
          }

          if (mode === "fa_to_de") this.lastFaToDeIndex = 0;
          else this.lastFaToDeIndex++;

          const result = {
            de_to_fa: () => ({ type: "de_to_fa", showWord: true }),
            word_with_sentence: () => ({
              type: "word_with_sentence",
              showSentence: true,
            }),
            fa_to_de: () => ({ type: "fa_to_de", showWord: true }),
            sentence_only: () => ({
              type: "sentence_only",
              showSentence: true,
              isSentence: true,
            }),
          }[mode]();

          return result;
        }

        nextQuestion() {
          this.currentWord = this.selectNextWord();
          if (!this.currentWord) {
            this.showLevelComplete();
            return;
          }

          this.currentQuestionType = this.determineQuestionType(
            this.currentWord,
          );
          this.currentSentence = null;

          this.currentWord.seenCount = (this.currentWord.seenCount || 0) + 1;
          this.gameState.lastWordId = this.currentWord.id;

          if (
            this.currentQuestionType.showSentence &&
            this.currentWord.sentences?.length > 0
          ) {
            const available = this.currentWord.sentences.filter(
              (s) => s.dueIn <= 0,
            );
            const pool =
              available.length > 0 ? available : this.currentWord.sentences;
            this.currentSentence =
              pool[Math.floor(Math.random() * pool.length)];
            if (this.currentSentence)
              this.currentSentence.seenCount =
                (this.currentSentence.seenCount || 0) + 1;
          }

          this.renderQuestion();
          this.updateUI();
          this.saveData();
        }

        renderQuestion() {
          const wordDisplay = document.getElementById("fallingWord");
          const sentenceDisplay = document.getElementById("sentenceDisplay");
          const questionType = document.getElementById("questionType");
          const answerOptions = document.getElementById("answerOptions");

          if (
            !wordDisplay ||
            !sentenceDisplay ||
            !questionType ||
            !answerOptions
          )
            return;

          wordDisplay.className =
            "falling-word text-4xl font-bold text-indigo-800 mb-4";
          sentenceDisplay.classList.add("hidden");
          questionType.textContent = "";

          switch (this.currentQuestionType.type) {
            case "de_to_fa":
              wordDisplay.innerHTML = `<a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(this.currentWord.word)}" target="_blank" class="text-indigo-800 hover:text-indigo-600 ">${this.currentWord.word}</a>`;
              questionType.textContent = "Translate to Persian";
              break;
            case "word_with_sentence":
              sentenceDisplay.textContent = `"${this.currentSentence.fa}"`;
              sentenceDisplay.classList.remove("hidden");
              questionType.textContent = "Find the adjective";
              wordDisplay.textContent = "?";
              break;
            case "fa_to_de":
              wordDisplay.textContent = this.currentWord.meaning;
              questionType.textContent = "Translate to German";
              break;
            case "sentence_only":
              sentenceDisplay.textContent = `"${this.currentSentence.de}"`;
              sentenceDisplay.classList.remove("hidden");
              questionType.textContent = "What does this sentence mean?";
              wordDisplay.textContent = "?";
              break;
          }
          this.generateAnswerOptions();
        }

        generateAnswerOptions() {
          const answerOptions = document.getElementById("answerOptions");
          answerOptions.innerHTML = "";

          let correctAnswer;
          switch (this.currentQuestionType.type) {
            case "de_to_fa":
              correctAnswer = this.currentWord.meaning;
              break;
            case "word_with_sentence":
              correctAnswer = this.currentWord.word;
              break;
            case "fa_to_de":
              correctAnswer = this.currentWord.word;
              break;
            case "sentence_only":
              correctAnswer = this.currentSentence.fa;
              break;
          }

          let options = [correctAnswer];
          const distractors = this.generateDistractors(correctAnswer, 3);
          options = options.concat(distractors);
          options.sort(() => Math.random() - 0.5);

          options.forEach((option) => {
            const button = document.createElement("button");
            button.className =
              "bg-white border-2 border-gray-300 rounded-lg p-4 text-center hover:border-indigo-500 hover:bg-indigo-50 transition-all transform hover:scale-105 shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2";

            if (
              this.currentQuestionType.type === "fa_to_de" ||
              this.currentQuestionType.type === "word_with_sentence"
            ) {
              button.innerHTML = `<div class="flex justify-between items-center">
                            <span>${option}</span>
                            <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(option)}" target="_blank" class="text-indigo-600 hover:text-indigo-800 text-sm ml-2" onclick="event.stopPropagation()">🌐</a>
                        </div>`;
            } else {
              button.textContent = option;
            }

            button.addEventListener("click", () =>
              this.checkAnswer(option, correctAnswer),
            );
            answerOptions.appendChild(button);
          });
        }

        generateDistractors(correctAnswer, count) {
          let distractors = new Set();
          const type = this.currentQuestionType.type;
          let candidates = [];

          if (type === "de_to_fa")
            candidates = this.words
              .filter((w) => w.meaning !== correctAnswer)
              .map((w) => w.meaning);
          else if (type === "fa_to_de" || type === "word_with_sentence")
            candidates = this.words
              .filter((w) => w.word !== correctAnswer)
              .map((w) => w.word);
          else if (type === "sentence_only")
            candidates = this.words
              .flatMap((w) => w.sentences || [])
              .filter((s) => s.fa !== correctAnswer)
              .map((s) => s.fa);

          candidates.sort(() => Math.random() - 0.5);

          for (let item of candidates) {
            if (distractors.size >= count) break;
            const correctLen = String(correctAnswer).length;
            const itemLen = String(item).length;
            if (
              Math.abs(correctLen - itemLen) <= 3 ||
              (correctAnswer &&
                item &&
                String(correctAnswer)[0].toLowerCase() ===
                  String(item)[0].toLowerCase())
            ) {
              distractors.add(item);
            }
          }

          while (distractors.size < count && candidates.length > 0) {
            distractors.add(
              candidates[Math.floor(Math.random() * candidates.length)],
            );
          }

          if (distractors.size < count) {
            const fallbacks = {
              de_to_fa: [
                "کوچک",
                "زیبا",
                "سریع",
                "قدیمی",
                "جدید",
                "خوب",
                "بد",
                "بزرگ",
                "گرم",
                "سرد",
              ],
              fa_to_de: [
                "klein",
                "schön",
                "schnell",
                "alt",
                "neu",
                "gut",
                "schlecht",
                "groß",
                "lang",
                "kurz",
              ],
              word_with_sentence: [
                "klein",
                "schön",
                "schnell",
                "alt",
                "neu",
                "gut",
                "groß",
                "lang",
                "kurz",
                "teuer",
              ],
              sentence_only: [
                "این جمله تست است.",
                "خانه کوچک است.",
                "من خوشحال هستم.",
                "او سریع می‌دود.",
                "کتاب جالب است.",
              ],
            };
            const list = fallbacks[type] || fallbacks["fa_to_de"];
            for (let fb of list) {
              if (fb !== correctAnswer) distractors.add(fb);
              if (distractors.size >= count) break;
            }
          }
          return Array.from(distractors).slice(0, count);
        }

        checkAnswer(selectedAnswer, correctAnswer) {
          if (this.isAnswering) return;
          this.isAnswering = true;

          const isCorrect = selectedAnswer === correctAnswer;

          this.pendingIsCorrect = isCorrect;
          this.pendingCorrectAnswer = correctAnswer;

          if (isCorrect) {
            this.gameState.correctAnswers++;
            const scoreMap = {
              de_to_fa: 10,
              word_with_sentence: 15,
              fa_to_de: 20,
              sentence_only: 25,
            };
            this.gameState.score +=
              scoreMap[this.currentQuestionType.type] || 10;
          } else {
            this.gameState.wrongAnswers++;
          }

          this.gameState.totalQuestions++;
          this.gameState.lastWordId = this.currentWord.id;

          this.saveData();
          this.showConfidenceModal();
          this.updateUI();
        }

        showConfidenceModal() {
          const modal = document.getElementById("confidenceModal");
          modal.classList.remove("hidden");
          modal.classList.add("flex");
          setTimeout(() => document.getElementById("sureBtn").focus(), 100);
        }

        handleConfidence(confidence) {
          const modal = document.getElementById("confidenceModal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");

          const isCorrect = this.pendingIsCorrect;
          const isSentence =
            this.currentQuestionType &&
            this.currentQuestionType.isSentence &&
            this.currentSentence;
          const target = isSentence ? this.currentSentence : this.currentWord;

          if (isCorrect) {
            if (confidence === "sure") {
              target.strength = Math.min(1, (target.strength || 0) + 0.25);
              target.dueIn = Math.min(40, (target.dueIn || 0) + 15);
              target.sureCount = (target.sureCount || 0) + 1;
              target.correctStreak = (target.correctStreak || 0) + 1;
              target.mistakeCount = 0;
            } else {
              target.strength = Math.min(1, (target.strength || 0) + 0.08);
              target.dueIn = Math.min(25, Math.max(1, (target.dueIn || 0) + 3));
              target.correctStreak = (target.correctStreak || 0) + 1;
              target.mistakeCount = 0;
            }
          } else {
            if (confidence === "sure") {
              target.strength = Math.max(0.001, (target.strength || 0) - 0.3);
              target.dueIn = 1;
              target.mistakeCount = (target.mistakeCount || 0) + 2;
              target.correctStreak = 0;
            } else {
              target.strength = Math.max(0.001, (target.strength || 0) - 0.05);
              target.dueIn = 1;
              target.mistakeCount = (target.mistakeCount || 0) + 1;
              target.correctStreak = 0;
            }
          }

          this.saveData();
          this.showResult(this.pendingIsCorrect, this.pendingCorrectAnswer);
          this.updateUI();
        }

        showResult(isCorrect, correctAnswer) {
          const modal = document.getElementById("resultModal");
          this.displayOriginalSentence();

          if (isCorrect) {
            document.getElementById("modalIcon").textContent = "✅";
            document.getElementById("modalTitle").textContent = "Correct!";
            document.getElementById("modalTitle").className =
              "text-2xl font-bold mb-2 text-green-600";
            document.getElementById("modalMessage").textContent =
              "Great job! Keep it up!";
            this.playSound("correct");
          } else {
            document.getElementById("modalIcon").textContent = "❌";
            document.getElementById("modalTitle").textContent = "Wrong";
            document.getElementById("modalTitle").className =
              "text-2xl font-bold mb-2 text-red-600";
            document.getElementById("modalMessage").textContent =
              `The correct answer was: ${correctAnswer}`;
            this.playSound("wrong");

            this.currentLevelMistakes.unshift({
              word: this.currentWord.word,
              meaning: this.currentWord.meaning,
              sentences: this.currentWord.sentences
                ? [...this.currentWord.sentences]
                : [],
            });

            if (this.currentLevelMistakes.length > 20)
              this.currentLevelMistakes.pop();
            this.saveData();
          }

          let content = `
                    <div class="mb-4">
                        <strong>Word:</strong> 
                        <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(this.currentWord.word)}" 
                           target="_blank" class="text-indigo-600 hover:underline">${this.currentWord.word}</a>
                    </div>
                    <div class="mb-3"><strong>Meaning:</strong> ${this.currentWord.meaning}</div>
                `;

          if (
            this.currentWord.sentences &&
            this.currentWord.sentences.length > 0
          ) {
            content += `<div class="mt-4"><strong>Example Sentences:</strong></div>`;
            this.currentWord.sentences.slice(0, 3).forEach((s) => {
              content += `
                            <div class="mt-3 pt-3 border-t border-gray-200">
                                <div class="text-sm text-gray-700">
                                    <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(s.de)}" target="_blank" class="hover:underline">${s.de}</a>
                                </div>
                                <div class="text-sm text-gray-600 mt-1">"${s.fa}"</div>
                            </div>
                        `;
            });
          }

          document.getElementById("modalDetails").innerHTML = content;
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        displayOriginalSentence() {
          const wordDisplay = document.getElementById("fallingWord");
          const sentenceDisplay = document.getElementById("sentenceDisplay");
          const questionType = document.getElementById("questionType");

          if (!wordDisplay || !sentenceDisplay || !questionType) return;

          wordDisplay.className =
            "falling-word text-4xl font-bold text-indigo-800 mb-4";
          sentenceDisplay.classList.remove("hidden");
          questionType.textContent = "Original sentence";

          if (
            (this.currentQuestionType.isSentence ||
              this.currentQuestionType.type === "word_with_sentence") &&
            this.currentSentence
          ) {
            sentenceDisplay.textContent = `"${this.currentSentence.de}"`;
            wordDisplay.innerHTML = `<a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(this.currentWord.word)}" target="_blank" class="text-indigo-800 hover:text-indigo-600 ">${this.currentWord.word}</a> ✓`;
          } else if (
            this.currentWord.sentences &&
            this.currentWord.sentences.length > 0
          ) {
            const rs =
              this.currentWord.sentences[
                Math.floor(Math.random() * this.currentWord.sentences.length)
              ];
            sentenceDisplay.innerHTML = `
                        <div class="text-lg text-gray-800">
                            <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(rs.de)}" target="_blank" class="hover:underline">${rs.de}</a>
                        </div>
                        <div class="text-sm text-gray-600 mt-2">"${rs.fa}"</div>
                    `;
            wordDisplay.innerHTML = `<a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(this.currentWord.word)}" target="_blank" class="text-indigo-800 hover:text-indigo-600 ">${this.currentWord.word}</a> ✓`;
          }
        }

        showMistakesModal() {
          const modal = document.getElementById("mistakesModal");
          const listContainer = document.getElementById("mistakesList");
          listContainer.innerHTML = "";

          if (this.currentLevelMistakes.length === 0) {
            listContainer.innerHTML = `<p class="text-gray-500 text-center py-8">هنوز اشتباهی ثبت نشده است.</p>`;
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            return;
          }

          this.currentLevelMistakes.forEach((item) => {
            let html = `
            <div class="border border-red-200 rounded-xl p-5 bg-red-50 hover:bg-red-100 transition-colors">
                <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(item.word)}" 
                   target="_blank" 
                   class="text-red-700 font-bold hover:underline text-xl block">
                    ${item.word}
                </a>
                <div class="text-gray-700 mt-1 text-lg">${item.meaning}</div>
        `;

            if (item.sentences && item.sentences.length > 0) {
              html += `
                <div class="mt-4">
                    <div class="text-sm font-semibold text-red-600 mb-2 flex items-center gap-2">
                        <span>Examples:</span>
                        <span class="px-2 py-0.5 bg-red-200 text-red-700 text-xs rounded-full">${item.sentences.length}</span>
                    </div>
            `;

              item.sentences.forEach((s) => {
                html += `
                    <div class="mb-4 last:mb-0 bg-white rounded-lg p-4 border border-red-100">
                        <div class="text-gray-800 leading-relaxed">
                            <a href="https://translate.google.com/?sl=de&tl=fa&text=${encodeURIComponent(s.de)}" 
                               target="_blank" 
                               class="hover:underline font-medium">
                                ${s.de}
                            </a>
                        </div>
                        <div class="text-gray-600 mt-2 text-[15px] leading-relaxed">
                            "${s.fa}"
                        </div>
                    </div>
                `;
              });

              html += `</div>`;
            } else {
              html += `<div class="text-xs text-gray-500 mt-3">بدون مثال ثبت شده</div>`;
            }

            html += `</div>`;
            listContainer.innerHTML += html;
          });

          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }
        closeMistakesModal() {
          const modal = document.getElementById("mistakesModal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }

        practiceMistakesOnly() {
          this.closeMistakesModal();
          alert(
            "✅ حالت تمرین فقط روی اشتباهات فعال شد.\n\nدر جلسات بعدی فقط کلماتی که اشتباه کردید نمایش داده خواهند شد.",
          );
        }

        showLevelComplete() {
          const modal = document.getElementById("resultModal");
          document.getElementById("modalIcon").textContent = "🎉";
          document.getElementById("modalTitle").textContent = "Level Complete!";
          document.getElementById("modalTitle").className =
            "text-2xl font-bold mb-2 text-green-600";
          document.getElementById("modalMessage").textContent =
            `You have mastered all active words in ${this.gameState.currentLevel}!`;
          document.getElementById("modalDetails").innerHTML =
            `<div class="text-center py-6 text-gray-600">You can continue practicing or change level from the menu.</div>`;

          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        closeModal() {
          const modal = document.getElementById("resultModal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");
          this.isAnswering = false;
          this.nextQuestion();
        }

        changeLevel(newLevel) {
          this.gameState.currentLevel = newLevel;
          this.resetSession();
          this.updateUI();
          this.saveData();
        }

        resetSession() {
          this.gameState.totalQuestions = 0;
          this.gameState.correctAnswers = 0;
          this.gameState.wrongAnswers = 0;
          document.getElementById("startBtn").classList.remove("hidden");
          document.getElementById("nextBtn").classList.add("hidden");
          document.getElementById("fallingWord").textContent =
            'Click "Start Game" to begin';
          document.getElementById("sentenceDisplay").classList.add("hidden");
          document.getElementById("answerOptions").innerHTML = "";
        }

        resetProgress() {
          if (confirm("Are you sure you want to reset all progress?")) {
            localStorage.clear();
            location.reload();
          }
        }

        updateUI() {
          const levelWords = this.words.filter(
            (w) => (w.level || "A1") === this.gameState.currentLevel,
          );
          const mastered = levelWords.filter((w) => (w.sureCount || 0) >= 2);
          const percentage = levelWords.length
            ? Math.round((mastered.length / levelWords.length) * 100)
            : 0;

          document.getElementById("correctCount").textContent =
            this.gameState.correctAnswers;
          document.getElementById("wrongCount").textContent =
            this.gameState.wrongAnswers;
          document.getElementById("score").textContent = this.gameState.score;
          document.getElementById("masteryProgress").textContent = percentage;
          document.getElementById("progressBar").style.width = `${percentage}%`;
          document.getElementById("levelSelect").value =
            this.gameState.currentLevel;

          document.getElementById("levelStats").innerHTML = `
                    Words: <strong>${levelWords.length}</strong> | 
                    Correct: <strong>${this.gameState.correctAnswers}</strong> | 
                    Wrong: <strong>${this.gameState.wrongAnswers}</strong>
                `;
        }

        playSound(type) {
          const audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);

          oscillator.frequency.value = type === "correct" ? 800 : 300;
          gainNode.gain.value = 0.1;

          oscillator.start();
          oscillator.stop(audioContext.currentTime + 0.1);
        }

        showError(message) {
          const toast = document.createElement("div");
          toast.className =
            "fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-pulse";
          toast.textContent = message;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        }
      }

      document.addEventListener(
        "DOMContentLoaded",
        () => new AdaptiveLearningGame(),
      );
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Adjectives Learning Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fall {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .falling-word {
            animation: fall 2s ease-out;
        }
        .modal-overlay {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans">
    <!-- Header -->
    <header class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-indigo-800">German Adjectives Learning</h1>
                <div class="flex gap-4 text-sm">
                    <div class="bg-green-100 px-3 py-1 rounded-full">
                        <span class="text-green-800 font-semibold">Correct: <span id="correctCount">0</span></span>
                    </div>
                    <div class="bg-red-100 px-3 py-1 rounded-full">
                        <span class="text-red-800 font-semibold">Wrong: <span id="wrongCount">0</span></span>
                    </div>
                    <div class="bg-blue-100 px-3 py-1 rounded-full">
                        <span class="text-blue-800 font-semibold">Score: <span id="score">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="container mx-auto px-4 py-4">
        <div class="bg-white rounded-lg shadow p-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-medium text-gray-700">Session Progress</span>
                <span class="text-sm text-gray-600"><span id="currentQuestion">0</span> / <span id="sessionSize">20</span></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-purple-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-3 text-xs text-gray-600">
                <div class="flex items-center gap-2">
                    <span>Level:</span>
                    <select id="levelSelect" class="bg-white border border-gray-300 rounded px-2 py-1 text-xs font-semibold">
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>
                <span>Session: <span id="sessionNumber">1</span></span>
                <span>Mode: <span id="gameMode" class="font-semibold">Auto</span></span>
            </div>
        </div>
    </div>

    <!-- Game Area -->
    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <!-- Falling Word Area -->
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-8 min-h-[200px] flex items-center justify-center">
                <div id="wordDisplay" class="text-center">
                    <div id="fallingWord" class="falling-word text-4xl font-bold text-indigo-800 mb-4">
                        Click "Start Game" to begin
                    </div>
                    <div id="sentenceDisplay" class="text-lg text-gray-600 mt-4 hidden">
                        <!-- Sentence will appear here -->
                    </div>
                    <div id="questionType" class="text-sm text-gray-500 mt-2">
                        <!-- Question type indicator -->
                    </div>
                </div>
            </div>

            <!-- Answer Options -->
            <div id="answerOptions" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <!-- Options will be generated here -->
            </div>

            <!-- Control Buttons -->
            <div class="flex justify-center gap-4">
                <button id="startBtn" class="bg-gradient-to-r from-green-500 to-green-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-green-600 hover:to-green-700 transition-all transform hover:scale-105 shadow-lg">
                    Start Game
                </button>
                <button id="nextBtn" class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-600 hover:to-blue-700 transition-all transform hover:scale-105 shadow-lg hidden">
                    Next Question
                </button>
                <button id="resetBtn" class="bg-gradient-to-r from-gray-500 to-gray-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-gray-600 hover:to-gray-700 transition-all transform hover:scale-105 shadow-lg">
                    Reset Progress
                </button>
            </div>
        </div>
    </main>

    <!-- Result Modal -->
    <div id="resultModal" class="fixed inset-0 bg-black bg-opacity-50 modal-overlay hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md mx-4 transform transition-all">
            <div class="text-center">
                <div id="modalIcon" class="text-6xl mb-4">
                    <!-- Icon will be set based on result -->
                </div>
                <h2 id="modalTitle" class="text-2xl font-bold mb-2">
                    <!-- Title will be set -->
                </h2>
                <p id="modalMessage" class="text-gray-600 mb-6">
                    <!-- Message will be set -->
                </p>
                <div id="modalDetails" class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
                    <!-- Additional details will be shown here -->
                </div>
                <button id="modalCloseBtn" class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-3 rounded-lg font-semibold hover:from-indigo-600 hover:to-purple-700 transition-all">
                    Continue
                </button>
            </div>
        </div>
    </div>

    <script>
        // Game State Management
        class AdaptiveLearningGame {
            constructor() {
                this.words = [];
                this.gameState = {
                    currentIndex: 0,
                    score: 0,
                    totalQuestions: 0,
                    correctAnswers: 0,
                    wrongAnswers: 0,
                    currentLevel: "A1",
                    sessionSize: 20,
                    newWordsCount: 5,
                    reviewWordsCount: 15,
                    lastWordId: null,
                    mode: "auto",
                    progress: 0,
                    sessionNumber: 1,
                    totalSessions: 0
                };
                this.currentWord = null;
                this.currentQuestionType = null;
                this.currentSentence = null;
                this.currentSentenceIndex = null;
                this.isAnswering = false;
                this.lastFaToDeIndex = 0;
                this.questionCounter = 0;
                
                this.init();
            }

            async init() {
                await this.loadData();
                this.setupEventListeners();
                this.updateUI();
            }

            async loadData() {
                try {
                    // Load words from p.json
                    const wordsResponse = await fetch('p.json');
                    this.words = await wordsResponse.json();
                    
                    // NORMALIZE WORD DATA WITH PROPER DEFAULTS
                    this.words = this.words.map(word => {
                        const normalizedWord = { ...word };
                        
                        // Normalize missing strength with random initialization
                        if (normalizedWord.strength === undefined || normalizedWord.strength === null || normalizedWord.strength === '') {
                            normalizedWord.strength = Math.random() * 0.5;
                        }
                        
                        // Ensure all required fields have defaults
                        normalizedWord.dueIn = normalizedWord.dueIn || 0;
                        normalizedWord.seenCount = normalizedWord.seenCount || 0;
                        normalizedWord.mistakeCount = normalizedWord.mistakeCount || 0;
                        normalizedWord.correctStreak = normalizedWord.correctStreak || 0;
                        
                        // Normalize sentences with proper defaults
                        normalizedWord.sentences = normalizedWord.sentences.map(s => ({
                            ...s,
                            strength: (typeof s.strength === 'number') ? s.strength : 0.3,
                            dueIn: s.dueIn ?? 0,
                            mistakeCount: s.mistakeCount ?? 0,
                            seenCount: s.seenCount ?? 0,
                            correctStreak: s.correctStreak ?? 0
                        }));
                        
                        return normalizedWord;
                    });
                    
                    // Load game state from localStorage
                    const savedState = localStorage.getItem('gameState');
                    if (savedState) {
                        this.gameState = JSON.parse(savedState);
                    } else {
                        // Initialize default game state
                        this.gameState = {
                            currentIndex: 0,
                            score: 0,
                            totalQuestions: 0,
                            correctAnswers: 0,
                            wrongAnswers: 0,
                            currentLevel: "A1",
                            sessionSize: 20,
                            newWordsCount: 5,
                            reviewWordsCount: 15,
                            lastWordId: null,
                            mode: "auto",
                            progress: 0,
                            sessionNumber: 1,
                            totalSessions: 0
                        };
                    }
                    
                    // Load saved words progress from localStorage
                    const savedWords = localStorage.getItem('words');
                    if (savedWords) {
                        const savedWordsData = JSON.parse(savedWords);
                        // Merge saved progress with normalized words
                        this.words = this.words.map(word => {
                            const savedWord = savedWordsData.find(w => w.id === word.id);
                            if (savedWord) {
                                return { ...word, ...savedWord };
                            }
                            return word;
                        });
                    }
                } catch (error) {
                    console.error('Error loading data:', error);
                    this.showError('Failed to load game data');
                }
            }

            saveData() {
                localStorage.setItem('gameState', JSON.stringify(this.gameState));
                localStorage.setItem('words', JSON.stringify(this.words));
            }

            setupEventListeners() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('nextBtn').addEventListener('click', () => this.nextQuestion());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetProgress());
                document.getElementById('modalCloseBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('levelSelect').addEventListener('change', (e) => this.changeLevel(e.target.value));
            }

            startGame() {
                this.gameState.totalQuestions = 0;
                this.gameState.correctAnswers = 0;
                this.gameState.wrongAnswers = 0;
                this.gameState.progress = 0;
                this.gameState.sessionNumber++;
                
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('nextBtn').classList.remove('hidden');
                
                this.nextQuestion();
            }

            // WORD SELECTION WITH LEVEL FILTERING AND STRICT PRIORITY
            selectNextWord() {
                // IMPLEMENT REAL SPACED REPETITION - GLOBAL DUEIN DECREMENT
                this.words.forEach(word => {
                    if (word.dueIn > 0) word.dueIn--;
                });
                
                // Filter by current level and due words
                const dueWords = this.words.filter(word => 
                    word.level === this.gameState.currentLevel && word.dueIn <= 0
                );
                
                if (dueWords.length === 0) {
                    // If no words are due for current level, reset all dueIn to 0
                    this.words.forEach(word => {
                        if (word.level === this.gameState.currentLevel) {
                            word.dueIn = 0;
                        }
                    });
                    return this.selectNextWord();
                }
                
                // Sort by strict priority: lower strength, higher mistakeCount, lower seenCount
                dueWords.sort((a, b) => {
                    // Primary: lower strength first
                    if (a.strength !== b.strength) {
                        return a.strength - b.strength;
                    }
                    // Secondary: higher mistakeCount first
                    if (a.mistakeCount !== b.mistakeCount) {
                        return b.mistakeCount - a.mistakeCount;
                    }
                    // Tertiary: lower seenCount first
                    return a.seenCount - b.seenCount;
                });
                
                return dueWords[0];
            }

            // STRENGTH-BASED QUESTION TYPE LOGIC WITH SENTENCE AVAILABILITY CHECK
            determineQuestionType(word) {
                const s = word.strength;
                this.questionCounter++;
                
                // FORCED ROTATION: Ensure fa_to_de appears at least once every 5 questions
                if (this.lastFaToDeIndex > 4) {
                    this.lastFaToDeIndex = 0;
                    // CHECK SENTENCE AVAILABILITY FOR fa_to_de
                    if (!word.sentences || word.sentences.length === 0) {
                        // FALLBACK HAPPENS HERE - INSIDE determineQuestionType ONLY
                        return { type: 'de_to_fa', showWord: true };
                    }
                    return { type: 'fa_to_de', showWord: true };
                }

                let mode;
                const rand = Math.random();

                if (s < 0.4) {
                    // 60% de_to_fa, 40% word_with_sentence
                    mode = rand < 0.6 ? 'de_to_fa' : 'word_with_sentence';
                } else if (s < 0.7) {
                    // 40% de_to_fa, 40% word_with_sentence, 20% fa_to_de
                    if (rand < 0.4) mode = 'de_to_fa';
                    else if (rand < 0.8) mode = 'word_with_sentence';
                    else mode = 'fa_to_de';
                } else {
                    // 40% fa_to_de, 40% sentence_only, 20% word_with_sentence
                    if (rand < 0.4) mode = 'fa_to_de';
                    else if (rand < 0.8) mode = 'sentence_only';
                    else mode = 'word_with_sentence';
                }

                // CHECK SENTENCE AVAILABILITY FOR SENTENCE-BASED TYPES
                if ((mode === 'word_with_sentence' || mode === 'sentence_only') && 
                    (!word.sentences || word.sentences.length === 0)) {
                    // FALLBACK HAPPENS HERE - INSIDE determineQuestionType ONLY
                    mode = 'de_to_fa';
                }

                // Update lastFaToDeIndex counter
                if (mode === 'fa_to_de') {
                    this.lastFaToDeIndex = 0;
                } else {
                    this.lastFaToDeIndex++;
                }

                const result = {
                    'de_to_fa': () => ({ type: 'de_to_fa', showWord: true }),
                    'word_with_sentence': () => ({ type: 'word_with_sentence', showSentence: true }),
                    'fa_to_de': () => ({ type: 'fa_to_de', showWord: true }),
                    'sentence_only': () => ({ type: 'sentence_only', showSentence: true, isSentence: true })
                }[mode]();

                return result;
            }

            nextQuestion() {
                // FIX: REMOVE QUESTION COUNTER INCREMENT (only in checkAnswer)
                if (this.gameState.totalQuestions >= this.gameState.sessionSize) {
                    this.endSession();
                    return;
                }

                this.currentWord = this.selectNextWord();
                this.currentQuestionType = this.determineQuestionType(this.currentWord);
                this.currentSentence = null;
                this.currentSentenceIndex = null;
                
                this.currentWord.seenCount++;
                this.gameState.lastWordId = this.currentWord.id;
                
                // PRE-SELECT SENTENCE IF NEEDED AND UPDATE seenCount
                if (this.currentQuestionType.showSentence) {
                    const sentences = this.currentWord.sentences
                        .filter(s => s.dueIn <= 0)
                        .sort((a, b) => a.strength - b.strength);
                    
                    this.currentSentence = sentences[0] || this.currentWord.sentences[0];
                    this.currentSentence.seenCount++;
                }
                
                this.renderQuestion();
                this.updateUI();
                this.saveData();
            }

            // PURE RENDERING FUNCTION - NO LOGIC CHANGES ALLOWED
            renderQuestion() {
                const wordDisplay = document.getElementById('fallingWord');
                const sentenceDisplay = document.getElementById('sentenceDisplay');
                const questionType = document.getElementById('questionType');
                const answerOptions = document.getElementById('answerOptions');
                
                // Reset displays
                wordDisplay.className = 'falling-word text-4xl font-bold text-indigo-800 mb-4';
                sentenceDisplay.classList.add('hidden');
                questionType.textContent = '';
                
                // RENDERING WITH CLOZE TEST FOR word_with_sentence
                switch (this.currentQuestionType.type) {
                    case 'de_to_fa':
                        wordDisplay.textContent = this.currentWord.word;
                        questionType.textContent = 'Translate to Persian';
                        break;
                        
                    case 'word_with_sentence':
                        // SAFE CLOZE TEST - WORD BOUNDARY REGEX WITH ESCAPING
                        const escapedWord = this.currentWord.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const regex = new RegExp(`\\b${escapedWord}\\b`, 'gi');
                        const clozeSentence = this.currentSentence.de.replace(regex, '_____');
                        sentenceDisplay.textContent = `"${clozeSentence}"`;
                        sentenceDisplay.classList.remove('hidden');
                        questionType.textContent = 'Fill in the blank';
                        wordDisplay.textContent = '?';
                        break;
                        
                    case 'fa_to_de':
                        wordDisplay.textContent = this.currentWord.meaning;
                        questionType.textContent = 'Translate to German';
                        break;
                        
                    case 'sentence_only':
                        sentenceDisplay.textContent = `"${this.currentSentence.de}"`;
                        sentenceDisplay.classList.remove('hidden');
                        questionType.textContent = 'What does this sentence mean?';
                        wordDisplay.textContent = '?';
                        break;
                }
                
                // Generate answer options
                this.generateAnswerOptions();
            }

            // FIXED ANSWER GENERATION - USE DATA ONLY
            generateAnswerOptions() {
                const answerOptions = document.getElementById('answerOptions');
                answerOptions.innerHTML = '';
                
                let correctAnswer;
                let options = [];
                
                // ANSWER GENERATION WITH MODE-SPECIFIC LOGIC
                switch (this.currentQuestionType.type) {
                    case 'de_to_fa':
                        correctAnswer = this.currentWord.meaning;
                        break;
                    case 'word_with_sentence':
                        // FIX: CORRECT ANSWER IS THE WORD (not meaning)
                        correctAnswer = this.currentWord.word;
                        break;
                    case 'fa_to_de':
                        correctAnswer = this.currentWord.word;
                        break;
                    case 'sentence_only':
                        correctAnswer = this.currentSentence.fa;
                        break;
                }
                
                // Add correct answer
                options.push(correctAnswer);
                
                // MODE-SPECIFIC OPTION GENERATION - NO MIXING ALLOWED
                let attempts = 0;
                while (options.length < 4 && attempts < 20) {
                    attempts++;
                    let randomOption;
                    
                    switch (this.currentQuestionType.type) {
                        case 'fa_to_de':
                            // ALL 4 options MUST be German words
                            const germanWords = this.words.filter(w => 
                                w.level === this.gameState.currentLevel && w.word !== correctAnswer
                            );
                            if (germanWords.length > 0) {
                                const randomIndex = Math.floor(Math.random() * germanWords.length);
                                randomOption = germanWords[randomIndex].word;
                            }
                            break;
                            
                        case 'de_to_fa':
                            // ALL 4 options MUST be Persian meanings
                            const persianMeanings = this.words.filter(w => 
                                w.level === this.gameState.currentLevel && w.meaning !== correctAnswer
                            );
                            if (persianMeanings.length > 0) {
                                const randomIndex = Math.floor(Math.random() * persianMeanings.length);
                                randomOption = persianMeanings[randomIndex].meaning;
                            }
                            break;
                            
                        case 'word_with_sentence':
                            // ALL options MUST be German words (cloze test)
                            const clozeWords = this.words.filter(w => 
                                w.level === this.gameState.currentLevel && w.word !== correctAnswer
                            );
                            if (clozeWords.length > 0) {
                                const randomIndex = Math.floor(Math.random() * clozeWords.length);
                                randomOption = clozeWords[randomIndex].word;
                            }
                            break;
                            
                        case 'sentence_only':
                            // ALL options MUST be Persian sentences
                            const allSentences = this.words
                                .filter(w => w.sentences && w.sentences.length)
                                .flatMap(w => w.sentences);
                            const otherSentences = allSentences.filter(s => s.fa !== correctAnswer);
                            if (otherSentences.length > 0) {
                                const randomIndex = Math.floor(Math.random() * otherSentences.length);
                                randomOption = otherSentences[randomIndex].fa;
                            }
                            break;
                    }
                    
                    if (randomOption && !options.includes(randomOption)) {
                        options.push(randomOption);
                    }
                }
                
                // Shuffle options
                options.sort(() => Math.random() - 0.5);
                
                // Create option buttons
                options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'bg-white border-2 border-gray-300 rounded-lg p-4 text-center hover:border-indigo-500 hover:bg-indigo-50 transition-all transform hover:scale-105 shadow-md';
                    button.textContent = option;
                    button.addEventListener('click', () => this.checkAnswer(option, correctAnswer));
                    answerOptions.appendChild(button);
                });
            }

            // IMPROVED LEARNING SPEED (+0.1/-0.1)
            checkAnswer(selectedAnswer, correctAnswer) {
                if (this.isAnswering) return;
                this.isAnswering = true;
                
                const isCorrect = selectedAnswer === correctAnswer;
                
                // UPDATE CURRENT ITEM WITH IMPROVED LEARNING SPEED
                if (this.currentQuestionType.isSentence && this.currentSentence) {
                    // SENTENCE-LEVEL UPDATE
                    if (isCorrect) {
                        this.currentSentence.correctStreak++;
                        this.currentSentence.mistakeCount = 0;
                        this.currentSentence.strength = Math.min(1, this.currentSentence.strength + 0.1);
                        this.currentSentence.dueIn = Math.min(25, this.currentSentence.dueIn * 1.5 + 2);
                    } else {
                        this.currentSentence.mistakeCount++;
                        this.currentSentence.correctStreak = 0;
                        this.currentSentence.strength = Math.max(0.001, this.currentSentence.strength - 0.1);
                        this.currentSentence.dueIn = 1;
                    }
                } else {
                    // WORD-LEVEL UPDATE
                    if (isCorrect) {
                        this.currentWord.correctStreak++;
                        this.currentWord.mistakeCount = 0;
                        this.currentWord.strength = Math.min(1, this.currentWord.strength + 0.1);
                        this.currentWord.dueIn = Math.min(25, this.currentWord.dueIn * 1.5 + 2);
                    } else {
                        this.currentWord.mistakeCount++;
                        this.currentWord.correctStreak = 0;
                        this.currentWord.strength = Math.max(0.001, this.currentWord.strength - 0.1);
                        this.currentWord.dueIn = 1;
                    }
                }
                
                // UPDATE GAME STATE WITH EXACT RULES
                if (isCorrect) {
                    this.gameState.correctAnswers++;
                    this.gameState.score += 10; // Fixed +10 per correct
                } else {
                    this.gameState.wrongAnswers++;
                }
                
                // FIX: INCREMENT QUESTION COUNTER ONLY HERE
                this.gameState.totalQuestions++;
                this.gameState.progress = this.gameState.totalQuestions / this.gameState.sessionSize;
                this.gameState.lastWordId = this.currentWord.id;
                
                // ENSURE PROPER LOCALSTORAGE PERSISTENCE
                this.saveData();
                this.showResult(isCorrect, correctAnswer);
                this.updateUI();
            }

            showResult(isCorrect, correctAnswer) {
                const modal = document.getElementById('resultModal');
                const modalIcon = document.getElementById('modalIcon');
                const modalTitle = document.getElementById('modalTitle');
                const modalMessage = document.getElementById('modalMessage');
                const modalDetails = document.getElementById('modalDetails');
                
                if (isCorrect) {
                    modalIcon.textContent = '✅';
                    modalTitle.textContent = 'Correct!';
                    modalTitle.className = 'text-2xl font-bold mb-2 text-green-600';
                    modalMessage.textContent = 'Great job! Keep it up!';
                } else {
                    modalIcon.textContent = '❌';
                    modalTitle.textContent = 'Wrong';
                    modalTitle.className = 'text-2xl font-bold mb-2 text-red-600';
                    modalMessage.textContent = `The correct answer was: ${correctAnswer}`;
                }
                
                // Show word details
                modalDetails.innerHTML = `
                    <div class="space-y-2">
                        <div><strong>Word:</strong> ${this.currentWord.word}</div>
                        <div><strong>Meaning:</strong> ${this.currentWord.meaning}</div>
                        <div><strong>Strength:</strong> ${(this.currentWord.strength * 100).toFixed(1)}%</div>
                        <div><strong>Correct Streak:</strong> ${this.currentWord.correctStreak}</div>
                        <div><strong>Mistakes:</strong> ${this.currentWord.mistakeCount}</div>
                        <div><strong>Seen:</strong> ${this.currentWord.seenCount} times</div>
                    </div>
                `;
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }

            closeModal() {
                const modal = document.getElementById('resultModal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                this.isAnswering = false;
                
                // FIX: REMOVE DUPLICATE nextQuestion CALL - ONLY CALL HERE
                if (this.gameState.totalQuestions < this.gameState.sessionSize) {
                    this.nextQuestion();
                } else {
                    this.endSession();
                }
            }

            // SIMPLIFIED SESSION FLOW - NO AUTOMATIC LEVEL PROGRESSION
            endSession() {
                this.gameState.totalSessions++;
                
                // CALCULATE LEVEL MASTERY FOR DISPLAY ONLY - NO AUTO LEVEL UP
                const levelWords = this.words.filter(w => w.level === this.gameState.currentLevel);
                const avgStrength = levelWords.reduce((sum, w) => sum + w.strength, 0) / levelWords.length;
                
                // RESET SESSION COUNTERS ONLY (NOT WORD PROGRESS)
                this.gameState.totalQuestions = 0;
                this.gameState.correctAnswers = 0;
                this.gameState.wrongAnswers = 0;
                this.gameState.progress = 0;
                
                this.saveData();
                
                const modal = document.getElementById('resultModal');
                const modalIcon = document.getElementById('modalIcon');
                const modalTitle = document.getElementById('modalTitle');
                const modalMessage = document.getElementById('modalMessage');
                const modalDetails = document.getElementById('modalDetails');
                
                modalIcon.textContent = '🎉';
                modalTitle.textContent = 'Session Complete!';
                modalTitle.className = 'text-2xl font-bold mb-2 text-indigo-600';
                
                modalMessage.textContent = `Session ${this.gameState.totalSessions} completed! Level mastery: ${(avgStrength * 100).toFixed(1)}%.`;
                
                modalDetails.innerHTML = `
                    <div class="space-y-2">
                        <div><strong>Current Level:</strong> ${this.gameState.currentLevel}</div>
                        <div><strong>Session Number:</strong> ${this.gameState.totalSessions}</div>
                        <div><strong>Session Size:</strong> ${this.gameState.sessionSize}</div>
                        <div><strong>Total Score:</strong> ${this.gameState.score}</div>
                        <div><strong>Level Mastery:</strong> ${(avgStrength * 100).toFixed(1)}%</div>
                        <div class="text-sm text-gray-600 mt-2">Change level manually using dropdown.</div>
                    </div>
                `;
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                // KEEP NEXT QUESTION BUTTON ACTIVE
            }

            changeLevel(newLevel) {
                this.gameState.currentLevel = newLevel;
                this.resetSession();
                this.updateUI();
                this.saveData();
            }

            resetSession() {
                this.gameState.totalQuestions = 0;
                this.gameState.correctAnswers = 0;
                this.gameState.wrongAnswers = 0;
                this.gameState.progress = 0;
                this.gameState.sessionNumber = 1;
                
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('wordDisplay').textContent = 'Click "Start Game" to begin';
                document.getElementById('answerOptions').innerHTML = '';
            }

            resetProgress() {
                if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                    localStorage.clear();
                    location.reload();
                }
            }

            updateUI() {
                document.getElementById('correctCount').textContent = this.gameState.correctAnswers;
                document.getElementById('wrongCount').textContent = this.gameState.wrongAnswers;
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('currentQuestion').textContent = this.gameState.totalQuestions;
                document.getElementById('sessionSize').textContent = this.gameState.sessionSize;
                document.getElementById('sessionNumber').textContent = this.gameState.sessionNumber;
                document.getElementById('gameMode').textContent = this.gameState.mode.charAt(0).toUpperCase() + this.gameState.mode.slice(1);
                document.getElementById('progressBar').style.width = `${this.gameState.progress * 100}%`;
                
                // Sync level dropdown with current level
                const levelSelect = document.getElementById('levelSelect');
                if (levelSelect && levelSelect.value !== this.gameState.currentLevel) {
                    levelSelect.value = this.gameState.currentLevel;
                }
            }

            showError(message) {
                alert(message);
            }
        }

        // Initialize game when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new AdaptiveLearningGame();
        });
    </script>
</body>
</html>
